[package]
name = "llama_cpp_test"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "main" # or your main app
path = "src/main.rs"

[dependencies]
llama-cpp-2 = "0.1.113"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
candle-core = "0.8.0"
candle-nn = "0.8.0"
candle-transformers = "0.8.0"
tokenizers = "0.20.0"
hf-hub = "0.3"
rand = "0.8"
dotenv = "0.15"

[build-dependencies]
cmake = "0.1"
