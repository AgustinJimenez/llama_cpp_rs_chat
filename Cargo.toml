[package]
name = "llama_cpp_test"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "main" # or your main app
path = "src/main.rs"

[dependencies]
llama-cpp-2 = "0.1.113"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
dotenv = "0.15"
sysinfo = "0.30"
wmi = "0.17"
uuid = { version = "1.0", features = ["v4"] }
regex = "1.0"

[build-dependencies]
cmake = "0.1"
