[package]
name = "llama_cpp_test"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "main" # or your main app
path = "src/main.rs"

[[bin]]
name = "test" # or your main app
path = "src/test.rs"

[[bin]]
name = "main_simple"
path = "src/main_simple.rs"

[[bin]]
name = "main_minimal"
path = "src/main_minimal.rs"

[dependencies]
llama-cpp-2 = "0.1.113"
# For CUDA:
# llama_cpp_2 = { version = "0.1", features = ["cuda"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
dotenv = "0.15"
sysinfo = "0.30"
wmi = "0.17"
uuid = { version = "1.0", features = ["v4"] }
regex = "1.0"
lazy_static = "1.4"

[build-dependencies]
cmake = "0.1"
