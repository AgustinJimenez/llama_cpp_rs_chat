name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --features dynamic-backends,cuda,vision
            label: windows
          - platform: macos-latest
            args: --features metal,vision
            label: macos-metal
          - platform: ubuntu-22.04
            args: --features vision
            label: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      # Linux: install system dependencies required by Tauri + llama.cpp
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            cmake \
            build-essential

      # Windows: install CUDA toolkit
      - name: Install CUDA (Windows)
        if: matrix.platform == 'windows-latest'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.6.2'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build frontend
        run: npm run build

      # Remove stale Cargo.lock so path deps resolve correctly
      - name: Refresh Cargo.lock
        run: |
          if [ -f Cargo.lock ]; then rm Cargo.lock; fi
        shell: bash

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.LLAMA_CHAT_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        with:
          tagName: v__VERSION__
          releaseName: 'LLaMA Chat v__VERSION__'
          releaseBody: |
            See the [CHANGELOG](https://github.com/AgustinJimenez/llama_cpp_rs_chat/blob/master/CHANGELOG.md) for details.

            ## Downloads
            - **Windows**: `.msi` or `-setup.exe` (auto-detects CUDA/CPU)
            - **macOS (Metal)**: `.dmg`
            - **Linux**: `.deb` or `.AppImage` (CPU inference)

            ## Requirements
            - **Windows GPU**: Download CUDA acceleration files from the [backends release](https://github.com/AgustinJimenez/llama_cpp_rs_chat/releases/tag/backends)
            - **macOS**: macOS 11+ (Big Sur), Metal GPU acceleration built-in
            - **Linux**: Ubuntu 22.04+ or compatible (CPU only for now)

            ## Auto-Update
            Existing installations will be notified of this update automatically.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
